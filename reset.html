<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Reset</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fafaf9; }
    .box { text-align: center; }
    button { background: #ef4444; color: white; border: none; padding: 0.75rem 2rem; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; }
    button:hover { background: #dc2626; }
    p { color: #78716c; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Rezept-App zurücksetzen</h2>
    <button onclick="reset()">Alle Daten löschen</button>
    <p id="msg"></p>
  </div>
  <script>
    function reset() {
      localStorage.removeItem('rezepte');
      localStorage.removeItem('wochenliste');
      document.getElementById('msg').textContent = '✓ Gelöscht. Du kannst diese Seite schließen.';
    }
  </script>
</body>
</html>
